<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inbox</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://kit.fontawesome.com/3c254bebea.js" crossorigin="anonymous"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html {
    scroll-behavior: smooth;
}

body {
    background: #050505;
    color: #f5f5f5;
    font-family: 'Inter', sans-serif;
    display: flex;
    justify-content: center;
}

.row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
}

.hero-title {
    font-size: clamp(6rem, 18vw, 15rem);
    font-weight: 800;
    letter-spacing: -0.08em;
    line-height: 0.9;
}

.hero-icon {
    font-size: clamp(6rem, 18vw, 15rem);
    line-height: 1.2;
}

.divider {
    width: 64px;
    height: 1px;
    background: rgba(255,255,255,.4);
    margin: 2rem auto;
}
</style>
</head>
<body>
<section id="hero">
    <div class="container">
        <div class="row">
            <img src="transparentwhitesquare.png" class="hero-image">
            <h1 class="project-title">Inbox</h1>
        </div>
        <div class="divider"></div>
        <p class="subtitle">Wednesdaily news.</p>
    </div>
</section>
</body>
</html>
